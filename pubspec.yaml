name: training_scheduler_cli
description: Water Academy - Training Scheduler for parsing and optimizing training schedules.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  excel: ^4.0.6
  collection: ^1.18.0
  intl: ^0.20.2
  meta: ^1.12.0
  drift: ^2.20.0
  sqlite3: ^2.4.3
  sqlite3_flutter_libs: ^0.5.20
  get_it: ^7.6.7
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2951.0
  fl_chart: ^0.66.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  desktop_drop: ^0.4.4
  window_manager: ^0.3.8
  genetic_algorithm: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
  test: ^1.25.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
